<!DOCTYPE html>
<html>
<head>
  <title>One Button EOG Games</title>
  <style>
    body{
      margin:0;background:radial-gradient(circle at top,#173b69,#020617);
      color:white;font-family:Arial, sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;
    }
    .box{
      width:950px;height:560px;background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);border-radius:28px;
      backdrop-filter:blur(18px);padding:22px;box-shadow:0 30px 90px #0008;
    }
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    button,select{
      padding:12px 18px;border-radius:14px;border:0;font-weight:700;
      background:linear-gradient(135deg,#38bdf8,#6366f1);color:white;
    }
    select{background:#0f172a;border:1px solid #38bdf8}
    canvas{width:100%;height:440px;background:#07111f;border-radius:22px;border:1px solid #ffffff22}
    .hint{color:#cbd5e1;margin-top:10px}
  </style>
</head>
<body>

<div class="box">
  <div class="top">
    <h1>👁 One-Button EOG Game Hub</h1>
    <div>
      <select id="gameSelect">
        <option value="flappy">Flappy Bird</option>
        <option value="jump">Geometry Jump</option>
        <option value="shooter">Space Shooter</option>
        <option value="basket">Basketball Timing</option>
        <option value="rocket">Rocket Landing</option>
        <option value="tunnel">Cyber Tunnel</option>
        <option value="aim">Aim Challenge</option>
      </select>
      <button onclick="start()">Start</button>
    </div>
  </div>

  <canvas id="c" width="900" height="440"></canvas>
  <div class="hint">Control: Press SPACE / Blink only</div>
</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
const select=document.getElementById("gameSelect");

let game="flappy", running=false, score=0, frame=0;
let player={}, objects=[], bullets=[], target={};

function reset(){
  score=0; frame=0; objects=[]; bullets=[];
  player={x:100,y:220,w:40,h:40,dy:0,lane:1,angle:0,power:0};
  target={x:700,y:220,r:35,dir:1};
}

function start(){
  game=select.value;
  reset();
  running=true;
  loop();
}

document.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    e.preventDefault();
    action();
  }
});

function action(){
  if(!running) return;

  if(game==="flappy") player.dy=-7;
  if(game==="jump" && player.y>=350) player.dy=-13;
  if(game==="shooter") bullets.push({x:player.x+45,y:player.y+15});
  if(game==="basket") shootBasket();
  if(game==="rocket") player.dy-=2.8;
  if(game==="tunnel") player.lane=(player.lane+1)%3;
  if(game==="aim") hitTarget();
}

function bg(){
  ctx.clearRect(0,0,900,440);
  let g=ctx.createLinearGradient(0,0,0,440);
  g.addColorStop(0,"#0f172a");g.addColorStop(1,"#020617");
  ctx.fillStyle=g;ctx.fillRect(0,0,900,440);

  for(let i=0;i<60;i++){
    ctx.fillStyle="#7dd3fc";
    ctx.fillRect((i*97+frame)%900,(i*53)%250,2,2);
  }

  ctx.fillStyle="#334155";
  ctx.fillRect(0,390,900,50);
  ctx.fillStyle="white";
  ctx.font="bold 22px Arial";
  ctx.fillText("Score: "+score,25,35);
}

function drawPlayer(color="#38bdf8"){
  ctx.save();
  ctx.shadowBlur=25;ctx.shadowColor=color;
  ctx.fillStyle=color;
  round(player.x,player.y,player.w,player.h,12);
  ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle="white";
  ctx.beginPath();ctx.arc(player.x+12,player.y+14,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(player.x+28,player.y+14,5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function flappy(){
  player.dy+=0.35; player.y+=player.dy;

  if(frame%90===0){
    let gap=135, top=Math.random()*170+40;
    objects.push({x:900,top:top,bottom:top+gap});
  }

  objects.forEach(o=>{
    o.x-=4;
    ctx.fillStyle="#22c55e";
    round(o.x,0,60,o.top,12);ctx.fill();
    round(o.x,o.bottom,60,440-o.bottom,12);ctx.fill();

    if(player.x<o.x+60&&player.x+player.w>o.x&&(player.y<o.top||player.y+player.h>o.bottom)) end();
  });

  if(player.y<0||player.y>390) end();
  drawPlayer();
}

function jump(){
  player.y+=player.dy;
  player.dy+=0.7;
  if(player.y>350){player.y=350;player.dy=0;}

  if(frame%80===0) objects.push({x:900,y:350,w:35,h:40});
  objects.forEach(o=>{
    o.x-=6;
    ctx.fillStyle="#f43f5e";
    ctx.beginPath();
    ctx.moveTo(o.x,o.y+40);ctx.lineTo(o.x+18,o.y);ctx.lineTo(o.x+35,o.y+40);
    ctx.fill();

    if(hit(player,o)) end();
  });

  drawPlayer("#a78bfa");
}

function shooter(){
  player.y=220+Math.sin(frame/25)*90;
  drawPlayer("#22d3ee");

  if(frame%55===0) objects.push({x:900,y:Math.random()*330+40,w:40,h:40});

  bullets.forEach(b=>{
    b.x+=10;
    ctx.fillStyle="#facc15";
    ctx.fillRect(b.x,b.y,20,5);
  });

  objects.forEach(o=>{
    o.x-=3.5;
    ctx.fillStyle="#ef4444";
    round(o.x,o.y,o.w,o.h,10);ctx.fill();

    bullets.forEach(b=>{
      if(b.x>o.x&&b.x<o.x+o.w&&b.y>o.y&&b.y<o.y+o.h){
        o.dead=true;b.dead=true;score+=10;
      }
    });

    if(hit(player,o)) end();
  });

  objects=objects.filter(o=>!o.dead&&o.x>-50);
  bullets=bullets.filter(b=>!b.dead&&b.x<900);
}

function basket(){
  ctx.fillStyle="#f97316";
  ctx.beginPath();ctx.arc(180,300,28,0,Math.PI*2);ctx.fill();

  ctx.strokeStyle="white";ctx.lineWidth=5;
  ctx.strokeRect(690,120,90,60);
  ctx.beginPath();ctx.arc(735,190,35,0,Math.PI);ctx.stroke();

  player.power=(Math.sin(frame/15)+1)/2;
  ctx.fillStyle="#38bdf8";
  ctx.fillRect(100,380,player.power*300,20);
  ctx.fillStyle="white";ctx.fillText("Press SPACE when power is near center",100,360);
}

function shootBasket(){
  let diff=Math.abs(player.power-.55);
  if(diff<.12) score+=10;
  else score-=5;
}

function rocket(){
  player.x=430; player.w=44; player.h=70;
  player.dy+=0.18; player.y+=player.dy;

  ctx.fillStyle="#38bdf8";
  ctx.beginPath();
  ctx.moveTo(player.x+22,player.y);
  ctx.lineTo(player.x+44,player.y+70);
  ctx.lineTo(player.x,player.y+70);
  ctx.fill();

  ctx.fillStyle="#22c55e";
  ctx.fillRect(360,390,180,12);

  if(player.y+70>=390){
    if(Math.abs(player.dy)<3){score+=50; reset();}
    else end();
  }
}

function tunnel(){
  let lanes=[110,220,330];
  player.y=lanes[player.lane]; player.x=120;

  ctx.strokeStyle="#38bdf8";ctx.lineWidth=2;
  lanes.forEach(y=>{ctx.beginPath();ctx.moveTo(0,y+20);ctx.lineTo(900,y+20);ctx.stroke();});

  if(frame%65===0){
    objects.push({x:900,lane:Math.floor(Math.random()*3),w:45,h:45});
  }

  objects.forEach(o=>{
    o.x-=7;
    o.y=lanes[o.lane];
    ctx.fillStyle="#ef4444";
    round(o.x,o.y,o.w,o.h,10);ctx.fill();
    if(player.lane===o.lane && player.x+40>o.x && player.x<o.x+45) end();
  });

  drawPlayer("#06b6d4");
}

function aim(){
  target.x+=target.dir*5;
  if(target.x>850||target.x<80) target.dir*=-1;

  ctx.fillStyle="#ef4444";
  ctx.beginPath();ctx.arc(target.x,target.y,target.r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="white";
  ctx.beginPath();ctx.arc(target.x,target.y,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#ef4444";
  ctx.beginPath();ctx.arc(target.x,target.y,7,0,Math.PI*2);ctx.fill();

  ctx.strokeStyle="#38bdf8";ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(450,0);ctx.lineTo(450,440);ctx.stroke();

  ctx.fillStyle="white";
  ctx.fillText("Blink when target crosses center line",250,390);
}

function hitTarget(){
  if(Math.abs(target.x-450)<35) score+=10;
  else score-=3;
}

function loop(){
  if(!running) return;
  frame++; score++;
  bg();

  if(game==="flappy") flappy();
  if(game==="jump") jump();
  if(game==="shooter") shooter();
  if(game==="basket") basket();
  if(game==="rocket") rocket();
  if(game==="tunnel") tunnel();
  if(game==="aim") aim();

  requestAnimationFrame(loop);
}

function end(){
  running=false;
  ctx.fillStyle="rgba(0,0,0,.65)";
  ctx.fillRect(0,0,900,440);
  ctx.fillStyle="white";
  ctx.font="bold 44px Arial";
  ctx.fillText("Game Over",330,200);
  ctx.font="22px Arial";
  ctx.fillText("Final Score: "+score,365,245);
  ctx.fillText("Click Start to play again",330,285);
}

function hit(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function round(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

bg();
ctx.fillStyle="white";
ctx.font="bold 34px Arial";
ctx.fillText("Select a game and press Start",250,220);
</script>

</body>
</html>
